name: Version Bump

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      version_bump_type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - preminor
          - premajor
      branch:
        description: 'Base branch to bump from (PR target; e.g. main or staging)'
        required: true
        default: main
        type: string

jobs:
  version-bump:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Require GH_TOKEN
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::GH_TOKEN secret is required to push the release branch, tags, and open a PR."
            echo "Create a PAT with Contents + Pull requests write."
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git credentials
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Create release work branch
        run: git checkout -b "chore/bump-${{ github.run_id }}"

      - name: Bump version in build.gradle
        id: bump
        run: |
          CURRENT_VERSION=$(grep -oE "version = '[^']+'" build.gradle | cut -d"'" -f2)
          echo "Current version: $CURRENT_VERSION"
          
          # Use npx semver to calculate the new version
          NEW_VERSION=$(npx semver $CURRENT_VERSION -i ${{ inputs.version_bump_type }})
          echo "New version: $NEW_VERSION"
          
          # Update build.gradle
          sed -i "s/version = '${CURRENT_VERSION}'/version = '${NEW_VERSION}'/" build.gradle
          
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          
          RELEASE_BRANCH="chore/release-v${NEW_VERSION}"
          git branch -m "${RELEASE_BRANCH}"
          echo "release_branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag new version
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add build.gradle
          git commit -m "chore: release v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"

      - name: Push release branch and tag
        run: |
          git push -u origin HEAD
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Open pull request
        id: pr
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          RELEASE_BRANCH: ${{ steps.bump.outputs.release_branch }}
          BASE_BRANCH: ${{ inputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY_FILE=$(mktemp)
          {
            echo "Automated version bump from [workflow run](${RUN_URL})."
            echo ""
            echo "- **Version:** v${VERSION}"
            echo "- **Bump:** ${{ inputs.version_bump_type }}"
            echo "- **Base branch:** ${BASE_BRANCH}"
            echo ""
            echo "Merge this PR to land the version bump on \`${BASE_BRANCH}\`. The git tag \`v${VERSION}\` is already pushed and points at this commit."
          } > "${BODY_FILE}"
          
          PR_URL=$(gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${RELEASE_BRANCH}" \
            --title "chore: release v${VERSION}" \
            --body-file "${BODY_FILE}")
            
          rm -f "${BODY_FILE}"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "## Version bump PR"
            echo ""
            echo "- **Version:** v${{ steps.bump.outputs.version }}"
            echo "- **Release branch:** \`${{ steps.bump.outputs.release_branch }}\`"
            echo "- **Base branch:** \`${{ inputs.branch }}\`"
            echo "- **Pull request:** ${{ steps.pr.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
